<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>AP – Truyendich</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- OneSignal v16 SDK (defer) -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>window.OneSignalDeferred = window.OneSignalDeferred || [];</script>
  </head>
  <body class="bg-white text-gray-900">
    <main class="max-w-xl mx-auto px-3 py-4">
      <h1 class="text-2xl font-extrabold tracking-tight mb-3">AP – Truyendich</h1>

      <!-- Đăng nhập -->
      <section class="mb-6">
        <h2 class="text-xl font-bold mb-2">Đăng nhập</h2>
        <div id="authBox" class="flex gap-2">
          <button id="btnGoogle" class="btn-primary">Google</button>
          <button id="btnLogout" class="btn-outline hidden">Đăng xuất</button>
        </div>
        <p id="authInfo" class="text-sm text-gray-600 mt-2"></p>
      </section>

      <!-- Thông báo đẩy -->
      <section class="mb-6">
        <h2 class="text-xl font-bold mb-2">Thông báo đẩy</h2>
        <div class="flex gap-2">
          <button id="btnEnablePush" class="btn-outline">Bật thông báo</button>
          <button id="btnCheckPush" class="btn-outline">Kiểm tra trạng thái</button>
        </div>
        <p id="pushState" class="text-sm text-gray-600 mt-2"></p>
      </section>

      <!-- Tạo ca -->
      <section class="mb-6">
        <h2 class="text-xl font-bold mb-3">Tạo ca truyền</h2>
        <form id="createForm" class="space-y-3">
          <input class="input" id="patient_name" placeholder="Bệnh nhân *" required />
          <div class="grid grid-cols-2 gap-3">
            <input class="input" id="room" placeholder="Phòng" />
            <input class="input" id="bed" placeholder="Giường" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <input class="input" id="volume_ml" type="number" placeholder="Thể tích (ml) *" required />
            <input class="input" id="drop_per_ml" type="number" placeholder="Số giọt/ml *" required />
          </div>
          <input class="input" id="rate_drop_per_min" type="number" placeholder="Tốc độ (giọt/phút) *" required />
          <textarea class="input" id="note" rows="2" placeholder="Ghi chú (tuỳ chọn)"></textarea>

          <label class="flex items-center gap-2">
            <input id="email_notify" type="checkbox" />
            <span>Nhận email khi ca kết thúc</span>
          </label>
          <input class="input" id="email_to" placeholder="Email nhận (nếu khác tài khoản)" />

          <button class="btn-primary w-full" id="btnStart" type="submit">Bắt đầu truyền</button>
        </form>
        <p id="createMsg" class="text-sm text-green-600 mt-2"></p>
      </section>

      <!-- Đang chạy -->
      <section class="mb-6">
        <div class="flex items-baseline justify-between">
          <h2 class="text-xl font-bold">Đang chạy</h2>
          <button id="btnReloadRunning" class="text-sm underline">Tải lại</button>
        </div>
        <div id="runningList" class="space-y-3 mt-3"></div>
      </section>

      <!-- Lịch sử -->
      <section class="mb-16">
        <div class="flex items-baseline justify-between">
          <h2 class="text-xl font-bold">Lịch sử</h2>
          <div class="flex gap-2">
            <button id="btnReloadHistory" class="text-sm underline">Tải lại</button>
            <button id="btnClearHistory" class="text-sm text-red-600 underline">Xoá lịch sử</button>
          </div>
        </div>
        <div id="historyList" class="space-y-3 mt-3"></div>
      </section>
    </main>

    <!-- App JS -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
